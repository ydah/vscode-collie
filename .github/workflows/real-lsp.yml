name: Real collie-lsp Integration

on:
  workflow_dispatch:
  schedule:
    - cron: '35 3 * * 2'

jobs:
  real-lsp:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: npm

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'

    - name: Install collie-lsp
      run: gem install collie-lsp

    - name: Install dependencies
      run: npm ci

    - name: Compile
      run: npm run compile

    - name: Probe real collie-lsp protocol
      run: npm run real-lsp:probe

    - name: Run real LSP tests (Linux)
      if: runner.os == 'Linux'
      env:
        COLLIE_LSP_REAL_SERVER: '1'
        VSCODE_TEST_VERSION: stable
      run: xvfb-run -a npm test

    - name: Run real LSP tests (Windows/macOS)
      if: runner.os != 'Linux'
      env:
        COLLIE_LSP_REAL_SERVER: '1'
        VSCODE_TEST_VERSION: stable
      run: npm test
