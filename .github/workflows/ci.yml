name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18.x, 20.x]
        vscode-version: [1.80.2, stable]

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: npm

    - name: Cache VS Code test binaries
      uses: actions/cache@v4
      with:
        path: .vscode-test
        key: vscode-test-${{ runner.os }}-${{ runner.arch }}-${{ matrix.vscode-version }}
        restore-keys: |
          vscode-test-${{ runner.os }}-${{ runner.arch }}-

    - name: Install dependencies
      run: npm ci

    - name: Audit production dependencies
      run: npm audit --omit=dev

    - name: Run linter
      run: npm run lint

    - name: Check types
      run: npm run check-types

    - name: Run tests (Linux)
      if: runner.os == 'Linux'
      env:
        VSCODE_TEST_VERSION: ${{ matrix.vscode-version }}
      run: xvfb-run -a npm test

    - name: Run tests (Windows/macOS)
      if: runner.os != 'Linux'
      env:
        VSCODE_TEST_VERSION: ${{ matrix.vscode-version }}
      run: npm test

  package:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: npm

    - name: Cache VS Code test binaries
      uses: actions/cache@v4
      with:
        path: .vscode-test
        key: vscode-test-${{ runner.os }}-${{ runner.arch }}-stable
        restore-keys: |
          vscode-test-${{ runner.os }}-${{ runner.arch }}-

    - name: Install dependencies
      run: npm ci

    - name: Package extension
      run: npm run package

    - name: Smoke test VSIX contents
      run: npm run package:smoke

    - name: Smoke test VSIX installation
      env:
        VSCODE_TEST_VERSION: stable
      run: xvfb-run -a npm run vsix:install-smoke

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: vsix
        path: '*.vsix'
