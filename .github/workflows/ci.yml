name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install dependencies
      run: npm install

    - name: Run linter
      run: npm run lint

    - name: Compile
      run: npm run compile

    - name: Run tests (Linux)
      if: runner.os == 'Linux'
      run: xvfb-run -a npm test

    - name: Run tests (Windows/macOS)
      if: runner.os != 'Linux'
      run: npm test

  package:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x

    - name: Install dependencies
      run: npm install

    - name: Package extension
      run: npm run package

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: vsix
        path: '*.vsix'
