name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version or semver increment passed to npm version
        required: true
        default: patch

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.RELEASE_PAT || github.token }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: npm

    - name: Install dependencies
      run: npm ci

    - name: Verify release secrets
      env:
        VSCE_PAT: ${{ secrets.VSCE_PAT }}
      run: |
        test -n "$VSCE_PAT" || (echo "VSCE_PAT is required to publish to the Marketplace" && exit 1)

    - name: Verify release branch
      run: |
        test "${{ github.ref_name }}" = "main" || (echo "Run releases from main" && exit 1)

    - name: Configure git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Bump version and create tag
      id: version
      run: |
        npm version "${{ github.event.inputs.version }}" -m "Release v%s"
        version="$(node -p "require('./package.json').version")"
        echo "version=${version}" >> "$GITHUB_OUTPUT"
        echo "tag=v${version}" >> "$GITHUB_OUTPUT"

    - name: Check
      run: |
        npm run lint
        npm run check-types

    - name: Package extension
      run: npm run package

    - name: Smoke test VSIX contents
      run: npm run package:smoke

    - name: Smoke test VSIX installation
      env:
        VSCODE_TEST_VERSION: stable
      run: xvfb-run -a npm run vsix:install-smoke

    - name: Locate VSIX
      id: vsix
      run: |
        vsix="$(ls -1 *.vsix | head -n 1)"
        test -n "$vsix"
        echo "path=${vsix}" >> "$GITHUB_OUTPUT"

    - name: Push release commit and tag
      run: git push origin HEAD:${{ github.ref_name }} --follow-tags

    - name: Publish to Marketplace
      env:
        VSCE_PAT: ${{ secrets.VSCE_PAT }}
      run: npx vsce publish --packagePath "${{ steps.vsix.outputs.path }}"

    - name: Upload VSIX to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: Collie ${{ steps.version.outputs.tag }}
        files: ${{ steps.vsix.outputs.path }}
        generate_release_notes: true
